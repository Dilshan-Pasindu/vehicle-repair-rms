name: VSRMS Professional CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # ── Backend Checks ──────────────────────────────────────────────────────────
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vsrms-backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './vsrms-backend/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Backend Tests
        run: npm test

  # ── Mobile Checks ───────────────────────────────────────────────────────────
  mobile:
    name: Mobile CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vsrms-mobile
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './vsrms-mobile/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Expo Doctor Check
        run: npx expo-doctor

      - name: Run Mobile Tests
        run: npm test

  # ── Infrastructure Status ───────────────────────────────────────────────────
  conclusion:
    name: Continuous Integration Status
    needs: [backend, mobile]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check Status
        run: |
          if [[ "${{ needs.backend.result }}" == "success" && "${{ needs.mobile.result }}" == "success" ]]; then
            echo "CI Passed Successfully"
            exit 0
          else
            echo "CI Failed"
            exit 1
          fi
